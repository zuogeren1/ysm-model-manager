# YSM Model Workshop — 自动索引生成
# 每次推送模型文件 (.ysm/.zip/.7z) 时自动更新 index.json
# 放置位置: .github/workflows/generate-index.yml（YSM-Model-Workshop 仓库根目录）

name: Generate index.json

on:
  push:
    branches: [main]
    paths:
      - "**.ysm"
      - "**.zip"
      - "**.7z"
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成 index.json
        run: |
          cat > genindex.go << 'GOEOF'
          package main

          import (
          	"crypto/sha256"
          	"encoding/json"
          	"fmt"
          	"io"
          	"os"
          	"path/filepath"
          	"strings"
          )

          type entry struct {
          	Name string `json:"name"`
          	Path string `json:"path"`
          	Size int64  `json:"size"`
          	Hash string `json:"hash,omitempty"`
          }

          func main() {
          	repoPath := "."
          	var list []entry
          	filepath.WalkDir(repoPath, func(p string, d os.DirEntry, err error) error {
          		if err != nil || d.IsDir() { return nil }
          		ext := strings.ToLower(filepath.Ext(p))
          		if ext != ".ysm" && ext != ".zip" && ext != ".7z" { return nil }
          		if strings.Contains(p, "/.github") { return nil }
          		rel, _ := filepath.Rel(repoPath, p)
          		rel = strings.ReplaceAll(rel, "\\", "/")
          		fi, _ := d.Info()
          		size := int64(0)
          		if fi != nil { size = fi.Size() }
          		hashStr := ""
          		if f, err := os.Open(p); err == nil {
          			h := sha256.New()
          			io.Copy(h, f)
          			hashStr = fmt.Sprintf("%x", h.Sum(nil))
          			f.Close()
          		}
          		list = append(list, entry{Name: d.Name(), Path: rel, Size: size, Hash: hashStr})
          		return nil
          	})
          	data, _ := json.MarshalIndent(list, "", "  ")
          	os.WriteFile("index.json", data, 0644)
          	fmt.Printf("✅ 已生成 index.json，共 %d 个模型\n", len(list))
          }
          GOEOF

          go run genindex.go
          rm genindex.go

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "index.json 无变化，跳过提交"
          else
            git commit -m "🔄 自动更新 index.json"
            git push
          fi
