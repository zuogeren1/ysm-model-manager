name: Build & Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go vet
        run: go vet ./go/...

      - name: Go test
        run: go test ./go/... -count=1 -v

  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npx vite build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails
        run: wails build -clean -ldflags "-X ysm-model-manager/go/version.Version=${{ github.ref_name }}"

      - name: Package
        run: |
          mkdir release
          copy build\bin\YSM-Model-Manager.exe release\
          copy workshop_sites.json release\
          copy creators.json release\
          copy workshop_gitHub.json release\ 2>nul || ver>nul
          cd release
          tar -czf ..\YSM-Model-Manager_${{ github.ref_name }}_windows_amd64.zip *

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: YSM-Model-Manager_*.zip
