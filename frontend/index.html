<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>YSM 模型管理器</title>
    <link rel="stylesheet" href="css/variables.css" />
    <script type="module" src="js/app-modules.js"></script>
    <!-- 旧版工具模块（合并为单个非 module 文件，共享全局作用域）-->
    <script src="js/app-legacy-bundle.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden">
    <div style="display: flex; height: 100vh; overflow: hidden">
      <app-nav></app-nav>
      <app-content></app-content>
    </div>
    <div
      id="global-loader"
      style="
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 9999;
        display: none;
      "
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        style="animation: spin 0.8s linear infinite"
      >
        <circle
          cx="12"
          cy="12"
          r="10"
          stroke="#7c83ff"
          stroke-width="3"
          fill="none"
          stroke-dasharray="31.4 10.5"
          stroke-linecap="round"
        />
      </svg>
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <app-toast></app-toast>
    <context-menu></context-menu>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        bus.emit("nav:change", { page: "instances" });

        // 加载动画控制
        let loadingCount = 0;
        bus.on("loading:start", () => {
          loadingCount++;
          document.getElementById("global-loader").style.display = "block";
        });
        bus.on("loading:end", () => {
          loadingCount--;
          if (loadingCount <= 0) {
            loadingCount = 0;
            document.getElementById("global-loader").style.display = "none";
          }
        });

        setTimeout(() => {
          bus.emit("toast:show", {
            msg: "✅ YSM 管理器 v1.0 预告版",
            duration: 3000,
            type: "success",
          });
        }, 500);
      });
    </script>
  </body>
</html>
